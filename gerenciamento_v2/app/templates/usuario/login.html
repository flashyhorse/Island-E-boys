<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciamento de Estoque</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; }
    header { background: #e87833; color: white; text-align: center; padding: 16px; font-weight: bold; font-size: 18px; }
    .card { background: white; width: 360px; margin: 60px auto; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; font-size: 22px; }
    .erro { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6c6; padding: 10px; border-radius: 4px; margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-size: 14px; color: #333; }
    input { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #45a049; }
    .cadastro-link { text-align: center; margin-top: 16px; font-size: 14px; }
    .cadastro-link a { color: #e87833; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>

  <header>Gerenciamento de Estoque</header>

  <div class="card">
    <h2>Fazer Login</h2>

    {% if erro %}
      <div class="erro">{{ erro }}</div>
    {% endif %}

    <form action="/login" method="post">

      <label>Email</label>
      <input type="email" name="email" placeholder="Digite seu email">

      <label>Senha</label>
      <input type="password" name="senha" placeholder="Digite sua senha">

      <button type="submit">Entrar</button>

    </form>

    <div class="cadastro-link">
      Não possui uma conta? <a href="/">Cadastrar</a>
    </div>
  </div>

</body>
</html>
