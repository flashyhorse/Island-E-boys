<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciamento de Estoque</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body { font-family: sans-serif; background: #f0f0f0; }
 
    header {
      background: #e87833;
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
    }
 
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }
 
    .search {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
      padding: 8px 12px;
      width: 320px;
      gap: 8px;
    }
 
    .search input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
    }
 
    .btn-add {
      background: #e87833;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
 
    .btn-add:hover { background: #cf6a25; }
 
    .table-wrap {
      margin: 0 20px;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
 
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
 
    thead tr {
      background: white;
      border-bottom: 2px solid #eee;
    }
 
    th {
      text-align: left;
      padding: 14px 16px;
      font-size: 12px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
    }
 
    td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
 
    tr:last-child td { border-bottom: none; }
 
    td img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      background: #ddd;
    }
 
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
    }
 
    .badge.green { background: #d4f4dd; color: #2e7d32; }
    .badge.red   { background: #fde8e8; color: #c0392b; }
 
    .acoes { display: flex; gap: 10px; }
 
    .acoes button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #666;
    }
 
    .acoes button:hover { color: #333; }
 
    .clock {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e87833;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>
 
  <header>
    <span>Gerenciamento de Estoque</span>
    <span id="userdate">Admin | 29/05/2026</span>
  </header>
 
  <div class="toolbar">
    <label class="search">
      <i class="fas fa-search"></i> <input type="text" placeholder="Pesquisar ID, Produto ou Local...">
    </label>
    <button class="btn-add">+ Adicionar Produto</button>
  </div>
 
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Produto</th>
          <th>Preço</th>
          <th>QTD</th>
          <th>Localização</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>0058</strong></td>
          <td>Notebook Pro</td>
          <td>R$ 4500,00</td>
          <td><span class="badge green">12 un.</span></td>
          <td>Galpão 12</td>
          <td class="acoes">
            <button title="Editar"><i class="fas fa-pen"></i></button>
            <button title="Excluir"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
 
  <div class="clock" id="clock">00:00:00</div>
 
  <script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  document.querySelector('.search input').addEventListener('input', function() {
    const termo = this.value.toLowerCase();
    const linhas = document.querySelectorAll('tbody tr');

    linhas.forEach(linha => {
      const texto = linha.textContent.toLowerCase();
      linha.style.display = texto.includes(termo) ? '' : 'none';
    });
  });
</script>
 
</body>
</html>
